<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AURA DeFAI Dashboard</title>

<link rel="stylesheet" href="./css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>

</head>

<body class="bg-gray-950 text-white">

<!-- Navbar -->

<nav class="flex items-center justify-between p-5 border-b border-gray-800 bg-gray-900">

<div class="flex items-center gap-4">

<button id="menuBtn"
class="text-3xl text-white">
☰
</button>

<h1 class="text-2xl font-bold text-green-400">
AURA DeFAI
</h1>

</div>

<button id="connectWalletBtn"
class="bg-green-500 px-5 py-2 rounded-full text-black font-bold">
Connect Wallet
</button>

</nav>


<div class="flex">

<!-- Sidebar -->

<aside id="sidebar"
class="hidden w-64 min-h-screen bg-gray-900 border-r border-gray-800 p-5">

<h2 class="text-xl font-bold text-green-400 mb-8">
AURA Menu
</h2>

<ul class="space-y-3">

<li>
<a href="#"
class="block p-3 rounded-xl bg-green-500 text-black font-bold">
Dashboard
</a>
</li>

<li>
<a href="#staking"
class="block p-3 rounded-xl hover:bg-gray-800">
Staking Core
</a>
</li>

<li>
<a href="#referral"
class="block p-3 rounded-xl hover:bg-gray-800">
Referral Engine
</a>
</li>

<li>
<a href="#rebase"
class="block p-3 rounded-xl hover:bg-gray-800">
Rebase Info
</a>
</li>

<li>
<a href="#rewards"
class="block p-3 rounded-xl hover:bg-gray-800">
Rewards
</a>
</li>

<li>
<a href="#transactions"
class="block p-3 rounded-xl hover:bg-gray-800">
Transactions
</a>
</li>

<li>
<a href="#dao"
class="block p-3 rounded-xl hover:bg-gray-800">
DAO Voting
</a>
</li>

<li>
<a href="#settings"
class="block p-3 rounded-xl hover:bg-gray-800">
Settings
</a>
</li>

</ul>

</aside>


<!-- Main Dashboard -->

<main class="flex-1 p-6 space-y-8">

<!-- Wallet -->

<div class="glass-card rounded-2xl p-6">

<h2 class="text-gray-400 text-sm mb-2">
Connected Account
</h2>

<p id="walletAddress">
Wallet Not Connected
</p>

</div>


<!-- Rebase Timer -->

<div class="glass-card rounded-2xl p-6">

<h2 class="text-gray-400 text-sm mb-2">
Next Rebase In
</h2>

<p id="rebaseTimer"
class="text-4xl font-bold text-green-400">
00:00:00
</p>

</div>


<!-- Grid -->

<div class="grid grid-cols-1 md:grid-cols-2 gap-8">

<!-- Staking -->

<div id="staking"
class="glass-card rounded-2xl p-6 space-y-4">

<h3 class="text-xl font-bold text-green-400">
Staking Core
</h3>

<p>Your Self Staked Position</p>

<p id="selfStakedAmount"
class="text-3xl font-bold">
0 USDT
</p>

<input id="stakeAuraInput"
type="number"
placeholder="AURA Amount"
class="w-full p-3 rounded-xl bg-gray-900">

<input id="stakeUsdtInput"
type="number"
placeholder="Estimated USDT Value"
class="w-full p-3 rounded-xl bg-gray-900">

<button id="approveBtn"
class="gradient-btn w-full py-3 rounded-xl text-black font-bold">
Approve Token
</button>

<button id="stakeBtn"
class="bg-gray-700 w-full py-3 rounded-xl">
Execute Stake
</button>

</div>


<!-- Referral -->

<div id="referral"
class="glass-card rounded-2xl p-6 space-y-4">

<h3 class="text-xl font-bold text-green-400">
Referral Engine
</h3>

<button id="createCodeBtn"
class="gradient-btn w-full py-3 rounded-xl text-black font-bold">
Generate Referral
</button>

<input id="refCodeInput"
placeholder="Referral Code"
class="w-full p-3 rounded-xl bg-gray-900">

<button id="registerRefBtn"
class="bg-gray-700 w-full py-3 rounded-xl">
Register Referral
</button>

</div>

</div>

</main>

</div>


<script src="./abi/AuraTokenABI.js"></script>
<script src="./abi/StakingABI.js"></script>
<script src="./abi/ReferralABI.js"></script>

<script src="./js/app.js"></script>

</body>
</html>
